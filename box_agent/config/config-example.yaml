# Box Agent Configuration
#
# Configuration File Locations (in priority order):
# 1) box_agent/config/config.yaml - Development mode (current directory)
# 2) ~/.box-agent/config/config.yaml - User config directory
# 3) <package>/box_agent/config/config.yaml - Package installation directory
#
# Fill in your API key and customize settings as needed

# ===== LLM Configuration =====
# Supported providers:
#   "anthropic" — Anthropic-compatible APIs (Anthropic, etc.)
#   "openai"    — OpenAI-compatible APIs (OpenAI, DeepSeek, SiliconFlow, etc.)
#
# Example api_base values:
#   Anthropic   : https://api.anthropic.com
#   OpenAI      : https://api.openai.com/v1
#   DeepSeek    : https://api.deepseek.com
#   SiliconFlow : https://api.siliconflow.cn/v1
api_key: "YOUR_API_KEY_HERE"
api_base: "https://api.anthropic.com"
model: "claude-sonnet-4-20250514"
provider: "anthropic"
# Hosted officev3 login auth lives outside config.yaml so token refreshes do not
# mark model/provider config dirty. By default Box-Agent reads auth.json next to
# this file before every LLM request and URL-based MCP connection.
# auth_file: "/path/to/auth.json"

# Model token budget. `context_window` is the total context the model accepts;
# `max_output_tokens` is the per-request output cap (`max_tokens` on the wire).
# Defaults target Claude Sonnet 4 (200k window, 64k output). The summarization
# trigger is derived: 90% of (context_window - max_output_tokens).
context_window: 180000
max_output_tokens: 80000

# ===== Lite LLM (Optional) =====
# Lightweight model for small, tool-free tasks: session-title generation,
# one-shot summaries, rewrites, etc.
# Leave this block out (or comment it) to route everything to the main LLM.
# Same auth rules as the main block: hosted gateways read auth.json when api_key is empty.
# lite_llm:
#   provider: "openai"
#   api_base: "https://api.openai.com/v1"
#   api_key: "YOUR_LITE_API_KEY"
#   model: "gpt-4o-mini"
#   max_output_tokens: 63999   # hard ceiling: 65536. Most lite endpoints reject larger values.

# ===== Retry Configuration =====
retry:
  enabled: true # Enable retry mechanism
  max_retries: 3 # Maximum number of retries
  initial_delay: 1.0 # Initial delay time (seconds)
  max_delay: 60.0 # Maximum delay time (seconds)
  exponential_base: 2.0 # Exponential backoff base (delay = initial_delay * base^attempt)

# ===== Agent Configuration =====
max_steps: 200 # Maximum execution steps
max_parallel_tools: 8 # Hard cap on concurrent parallel_safe tool calls (sub_agent, generate_image) per step
workspace_dir: "./workspace" # Working directory
system_prompt_path: "system_prompt.md" # System prompt file (same config directory)

# ===== Memory Configuration =====
enable_memory: true # Enable cross-session memory system
memory_dir: "~/.box-agent/memory" # Memory storage directory

# ===== Memory Auto-Extraction =====
enable_memory_extraction: true # Auto-extract memories at lifecycle points
memory_extraction_cooldown: 300 # Seconds between extractions (prevents LLM spam)
memory_extraction_step_interval: 10 # Extract every N agent steps

# ===== Tools Configuration =====
tools:
  # Safety: restrict tools to workspace directory only
  allow_full_access: false # true: tools can access full system; false: restricted to workspace

  # Basic tool switches
  enable_file_tools: true # File read/write/edit tools (ReadTool, WriteTool, EditTool)
  enable_bash: true # Bash command execution tool
  enable_todo: true # Task tracking tool (TodoWriteTool, TodoReadTool)

  # Claude Skills
  enable_skills: true # Enable Skills
  skills_dir: "./skills" # Skills directory path

  # MCP Tools
  enable_mcp: true # Enable MCP tools
  mcp_config_path:
    "mcp.json" # MCP configuration file (same config directory)
    # Note: API Keys for MCP tools are configured in mcp.json
  # MCP timeout configuration (prevents hanging on network issues)
  mcp:
    connect_timeout: 10.0 # Connection timeout in seconds (default: 10)
    execute_timeout: 60.0 # Tool execution timeout in seconds (default: 60)
    sse_read_timeout: 120.0 # SSE read timeout in seconds (default: 120)

# ===== Image Generation Service =====
# The built-in generate_image tool reads this block the same way LLM requests
# read api_base/api_key/auth_file. If api_key is empty and the endpoint is a
# hosted officev3 domain, Box-Agent reuses auth.json / BOX_AGENT_AUTH_TOKEN.
image_generation:
  endpoint: "http://10.158.136.99:9000/api/web/llm/v2/images/gen" # e.g. "https://your-service/v1/images/generations"
  api_key: "" # optional dedicated bearer token; leave empty to reuse hosted auth
  model: "gpt-image-1"
  timeout: 300.0
  # auth_file defaults to the top-level auth_file / auth.json next to config.yaml.
  # auth_file: "/path/to/auth.json"
#
# Environment variables remain supported for host/runtime overrides:
# BOX_AGENT_IMAGE_GENERATION_ENDPOINT, BOX_AGENT_IMAGE_GENERATION_API_KEY,
# BOX_AGENT_IMAGE_GENERATION_TIMEOUT, BOX_AGENT_IMAGE_GEN_ENDPOINT,
# BOX_AGENT_IMAGE_GEN_API_KEY.
# For this image backend, prefer exact `size` values from the supported presets:
# 1:1 2048x2048 / 3072x3072 / 4096x4096
# 16:9 2848x1600 / 4096x2304 / 5504x3040
# 9:16 1600x2848 / 2304x4096 / 3040x5504
# 4:3 2304x1728 / 3456x2592 / 4704x3520
# 3:4 1728x2304 / 2592x3456 / 3520x4704
# 3:2 2496x1664 / 3744x2496 / 4992x3328
# 2:3 1664x2496 / 2496x3744 / 3328x4992
# 21:9 3136x1344 / 4704x2016 / 6240x2656

# ===== officev3 Permission Settings =====
# Optional. Only honored when this whole block is present in the loaded
# config.yaml — otherwise box-agent runs in legacy "allow_full_access" mode.
# officev3 owns this block: it writes the file then restarts box-agent-acp,
# so box-agent-acp does NOT mutate it at runtime.
#
# officev3:
#   permissions:
#     filesystem:
#       # scope semantics:
#       #   session_workspace — allow paths.session_workspace_root + workspace + allowed_directories
#       #   custom            — same as session_workspace (alias used by officev3)
#       #   user_home         — allow the entire $HOME tree
#       scope: session_workspace
#       # Extra directories appended to session_workspace / custom scopes.
#       # Paths may use ~ or absolute form.
#       allowed_directories:
#         - ~/Downloads
#         - ~/Desktop
#     memory:
#       openclaw_import: true  # allow one-time import from ~/.openclaw/
#   paths:
#     session_workspace_root: ""  # absolute path; defaults to workspace_dir if empty
