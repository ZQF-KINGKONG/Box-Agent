# 2026 FIFA 世界杯 — 真实赛程(美/加/墨主办,48 队 / 12 组)
#
# 数据来源:2025-12-05 华盛顿 final draw + 公开赛程(ESPN / Al Jazeera / FIFA)。
# 抓取于 2026-06-16。这里收录小组赛 6/15–6/18 的真实对阵、场地与开球时间。
#
# 字段说明:
#   date: YYYY-MM-DD
#   time: "HH:MM" ET(美东,引号包裹)
#   stage: 小组赛 | 1/32决赛 | 1/16决赛 | 1/4决赛 | 半决赛 | 决赛
#   group: A-L(小组赛)
#   home / away: 球队代码(见 references/teams/*.yaml 的 code)
#   neutral: true=中性场(世界杯默认);false=东道主在本国主场,享主场加成
#   venue: 球场所在城市
#
# 重要:
# - 世界杯小组赛多为中性场,故 neutral 默认 true(predict.py 不施加主场加成)。
#   仅东道主(美/加/墨)在本国比赛时 neutral:false。
# - 球队库已覆盖全部 48 队(references/teams/),正常对阵均可直接预测。
#   若个别球队需更新,按相同格式修改对应 references/teams/<name>.yaml 即可。
# - predict.py 用 --today YYYY-MM-DD 过滤 [today, today+1] 内的比赛。

